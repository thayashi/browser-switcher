<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <clipPath id="clip"><rect x="0" y="0" width="256" height="256" rx="56" ry="56"></rect></clipPath>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"></stop>
      <stop offset="100%" stop-color="#EEF1F5"></stop>
    </linearGradient>
    <linearGradient id="sheen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.6"></stop>
      <stop offset="55%" stop-color="#ffffff" stop-opacity="0"></stop>
    </linearGradient>
    <linearGradient id="edge" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0F172A" stop-opacity="0.10"></stop>
      <stop offset="100%" stop-color="#0F172A" stop-opacity="0.04"></stop>
    </linearGradient>
    <radialGradient id="rg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#0F172A" stop-opacity="0.04"></stop>
      <stop offset="100%" stop-color="#0F172A" stop-opacity="0"></stop>
    </radialGradient>
    <filter id="discShadow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3"></feGaussianBlur>
      <feOffset dx="0" dy="2" result="off"></feOffset>
      <feComponentTransfer><feFuncA type="linear" slope="0.18"></feFuncA></feComponentTransfer>
      <feMerge><feMergeNode></feMergeNode><feMergeNode in="SourceGraphic"></feMergeNode></feMerge>
    </filter>
  </defs>
  <g clip-path="url(#clip)">
    <rect x="0" y="0" width="256" height="256" fill="url(#bg)"></rect>
    <circle cx="128" cy="128" r="110" fill="url(#rg)"></circle>
    <g style="mix-blend-mode:multiply">
      <circle cx="92" cy="96" r="52" fill="#E5484D" fill-opacity="0.88" filter="url(#discShadow)"></circle>
      <circle cx="164" cy="96" r="52" fill="#F5A524" fill-opacity="0.88" filter="url(#discShadow)"></circle>
      <circle cx="92" cy="168" r="52" fill="#46A758" fill-opacity="0.88" filter="url(#discShadow)"></circle>
      <circle cx="164" cy="168" r="52" fill="#3B82F6" fill-opacity="0.88" filter="url(#discShadow)"></circle>
    </g>
    <g opacity="0.7">
      <ellipse cx="80" cy="80" rx="18" ry="10" fill="#fff" opacity="0.85"></ellipse>
      <ellipse cx="152" cy="80" rx="18" ry="10" fill="#fff" opacity="0.85"></ellipse>
      <ellipse cx="80" cy="152" rx="18" ry="10" fill="#fff" opacity="0.55"></ellipse>
      <ellipse cx="152" cy="152" rx="18" ry="10" fill="#fff" opacity="0.55"></ellipse>
    </g>
    <rect x="0" y="0" width="256" height="256" fill="url(#sheen)"></rect>
  </g>
  <rect x="0.5" y="0.5" width="255" height="255" rx="55.5" ry="55.5" fill="none" stroke="url(#edge)" stroke-width="1"></rect>
</svg>