<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>About Browser Switcher</title>
    <style>
      :root {
        color-scheme: light dark;
        font-family: "Segoe UI", system-ui, sans-serif;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: stretch;
        background: Canvas;
        color: CanvasText;
      }

      main {
        box-sizing: border-box;
        width: 100%;
        padding: 1.5rem;
        line-height: 1.5;
      }

      .header {
        display: flex;
        gap: 1rem;
        align-items: center;
        margin-bottom: 1.25rem;
      }

      .app-icon {
        width: 3.5rem;
        height: 3.5rem;
        flex: 0 0 auto;
      }

      h1 {
        margin: 0 0 0.25rem;
        font-size: 1.35rem;
        font-weight: 600;
      }

      .version {
        margin: 0;
        color: GrayText;
        font-size: 0.9rem;
      }

      p {
        margin: 0 0 0.75rem;
      }

      button {
        margin-top: 1rem;
        min-width: 5rem;
        min-height: 2rem;
        padding: 0 1rem;
        font: inherit;
      }
    </style>
  </head>
  <body>
    <main>
      <div class="header">
        <img class="app-icon" src="./icon.png" alt="" aria-hidden="true" />
        <div>
          <h1>Browser Switcher</h1>
          <p class="version">Version __APP_VERSION__</p>
        </div>
      </div>
      <p>Opens Windows Default Apps settings for installed browsers.</p>
      <p>Browser Switcher does not change default apps directly.</p>
      <button type="button" id="ok-button">OK</button>
    </main>
    <script>
      document.getElementById("ok-button").addEventListener("click", () => {
        window.__TAURI__.window.getCurrentWindow().hide();
      });
    </script>
  </body>
</html>
